version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: languagecoach-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: languagecoach
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: languagecoach-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Database=languagecoach;Username=postgres;Password=postgres
      Jwt__Secret: ${JWT_SECRET:-your-super-secret-key-that-is-at-least-32-characters-long}
      Jwt__Issuer: LanguageCoach
      Jwt__Audience: LanguageCoach
      AzureOpenAI__Endpoint: ${AZURE_OPENAI_ENDPOINT:-}
      AzureOpenAI__ApiKey: ${AZURE_OPENAI_API_KEY:-}
    ports:
      - "5000:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    container_name: languagecoach-web
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
